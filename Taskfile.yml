version: "3"

vars:
  PROJECT_NAME: ccusage-gauge
  EXECUTABLE_NAME: ccusage-gauge
  TAP_DIR: ../homebrew-tap

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Build the Swift package
    deps: [frontend:build]
    cmds:
      - swift build

  run:
    desc: Run the executable
    cmds:
      - swift run {{.EXECUTABLE_NAME}} {{.CLI_ARGS}}

  test:
    desc: Run Swift tests
    cmds:
      - swift test

  clean:
    desc: Clean SwiftPM and release artifacts
    cmds:
      - rm -rf .build dist release

  lint:
    desc: Run SwiftLint when available
    cmds:
      - swiftlint

  frontend:install:
    desc: Install pinned dashboard dependencies
    dir: frontend
    cmds:
      - bun install --frozen-lockfile

  frontend:check:
    desc: Typecheck the SolidJS dashboard
    dir: frontend
    deps: [frontend:install]
    cmds:
      - bun run check

  frontend:build:
    desc: Build and synchronize the SolidJS dashboard assets
    dir: frontend
    deps: [frontend:install]
    cmds:
      - bun run build
      - ../scripts/sync-frontend-assets.sh

  smoke:assets:
    desc: Verify supported packaged dashboard asset layouts
    deps: [frontend:build]
    cmds:
      - scripts/smoke-packaged-assets.sh --layout all
      - scripts/smoke-packaged-assets.sh --layout all --expect-missing-diagnostics

  smoke:isolated-runtime:
    desc: Verify isolated config/state and invalid explicit ccusage behavior
    cmds:
      - scripts/smoke-isolated-runtime.sh

  smoke:dashboard:
    desc: Verify dashboard routes, shutdown, and same-port restart
    deps: [frontend:build]
    cmds:
      - scripts/smoke-dashboard.sh --port 18081 --assets frontend/dist

  e2e:build:
    desc: Build an isolated macOS app bundle for Computer Use E2E testing
    cmds:
      - scripts/build-e2e-app.sh {{.CLI_ARGS}}

  build:homebrew:
    desc: Build standalone Homebrew formula archives for the current platform, or pass targets after --
    cmds:
      - scripts/build-homebrew-release.sh {{.CLI_ARGS}}

  homebrew:formula:
    desc: Render Formula/ccusage-gauge.rb from dist/homebrew checksums
    cmds:
      - scripts/render-homebrew-formula.sh {{.CLI_ARGS}}

  homebrew:tap-formula:
    desc: Render the formula into the default sibling Homebrew tap checkout
    cmds:
      - |
        set -euo pipefail
        if [ -z "{{.CLI_ARGS}}" ]; then
          echo "usage: task homebrew:tap-formula -- <version>" >&2
          exit 2
        fi
        scripts/render-homebrew-formula.sh "{{.CLI_ARGS}}" "{{.TAP_DIR}}/Formula/ccusage-gauge.rb"

  build:homebrew-cask:
    desc: Build signed and notarized Homebrew Cask app archives, or pass targets after --
    cmds:
      - scripts/build-homebrew-cask-release.sh {{.CLI_ARGS}}

  homebrew:cask:
    desc: Render Casks/ccusage-gauge.rb from dist/homebrew-cask checksums
    cmds:
      - scripts/render-homebrew-cask.sh {{.CLI_ARGS}}

  homebrew:tap-cask:
    desc: Render the cask into the default sibling Homebrew tap checkout
    cmds:
      - |
        set -euo pipefail
        if [ -z "{{.CLI_ARGS}}" ]; then
          echo "usage: task homebrew:tap-cask -- <version>" >&2
          exit 2
        fi
        scripts/render-homebrew-cask.sh "{{.CLI_ARGS}}" "{{.TAP_DIR}}/Casks/ccusage-gauge.rb"

  release:homebrew-cask-local:
    desc: Build, notarize, upload, and render the sibling tap cask for a v<version> tag
    cmds:
      - scripts/release-homebrew-cask-local.sh {{.CLI_ARGS}}
